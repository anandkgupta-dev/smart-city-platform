services:
  - type: web
    name: smart-city-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ML_API_URL
        value: https://smart-city-ml.onrender.com
        
  - type: web
    name: smart-city-ml
    env: python
    rootDir: ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
